<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2563eb"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Mis Viajes"><link rel="manifest" href="manifest.json"><title>Mis Viajes</title><style>
:root{--bg:#f4f6fb;--card:#fff;--text:#101423;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--soft:#dbeafe;--danger:#ef4444;--shadow:0 14px 35px #10182812}body.dark{--bg:#090d16;--card:#171b24;--text:#f9fafb;--muted:#a1a1aa;--line:#2b3140;--soft:#172554;--shadow:0 14px 35px #0008}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea{font:inherit}button{border:0;border-radius:16px;font-weight:800}a{color:var(--blue);font-weight:800;text-decoration:none}.top{position:sticky;top:0;z-index:10;background:rgba(244,246,251,.9);backdrop-filter:blur(16px);display:flex;gap:10px;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;border-bottom:1px solid var(--line)}body.dark .top{background:rgba(9,13,22,.9)}.title{flex:1;text-align:center;font-size:20px;font-weight:900}.round{width:46px;height:46px;border-radius:50%;background:var(--card);color:var(--text);border:1px solid var(--line);font-size:20px}main{max-width:520px;margin:0 auto;padding:18px 16px 98px}.hero{height:215px;border-radius:30px;overflow:hidden;position:relative;color:white;margin-bottom:16px;box-shadow:var(--shadow);background:linear-gradient(135deg,#60a5fa,#111827)}.hero img{width:100%;height:100%;object-fit:cover;display:none}.hero.hasimg img{display:block}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#0000,#000b)}.heroText{position:absolute;inset:auto 0 0 0;z-index:1;padding:22px}.hero h1{font-size:37px;margin:0}.hero p{margin:6px 0 0;font-weight:800;opacity:.95}.tabs,.bottom{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab,.nav{background:var(--card);color:var(--text);border:1px solid var(--line);padding:10px 4px;min-height:66px}.tab.active,.nav.active,.primary{background:var(--blue);color:white}.tab span,.nav span{display:block;font-size:21px}.tab small{font-size:11px;font-weight:900}.search,input,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;background:var(--card);color:var(--text);margin:10px 0;font-size:16px}textarea{min-height:220px;line-height:1.45}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;margin:14px 0;box-shadow:var(--shadow)}.card h2,.card h3{margin:0 0 12px}.muted{color:var(--muted)}.primary{width:100%;padding:15px;margin:8px 0;font-size:17px}.secondary{background:var(--soft);color:var(--blue);padding:11px 13px}.danger{background:#fee2e2;color:var(--danger);padding:11px 13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.row{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.badge{display:inline-block;background:var(--soft);color:var(--blue);padding:6px 10px;border-radius:999px;font-size:13px;font-weight:900;margin:3px 4px 3px 0}.day{border-left:5px solid var(--blue)}.head{display:flex;justify-content:space-between;gap:10px}.timeitem{display:grid;grid-template-columns:70px 1fr;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:10px;margin:8px 0}.time{color:var(--blue);font-weight:900;text-decoration:underline}.block{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.raw{white-space:pre-wrap;line-height:1.45}.place{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.place a{display:block;font-size:17px}.side{position:fixed;z-index:30;inset:0 auto 0 -330px;width:320px;max-width:86vw;background:#111827;color:white;padding:calc(env(safe-area-inset-top) + 18px) 15px 30px;transition:.25s;box-shadow:18px 0 40px #0007}.side.open{left:0}.shade{position:fixed;inset:0;background:#0007;display:none;z-index:20}.shade.show{display:block}.sidehead{display:flex;justify-content:space-between;align-items:center}.trip{display:grid;grid-template-columns:54px 1fr;gap:12px;padding:10px;border-radius:18px;background:#ffffff12;margin:9px 0}.trip.active{background:#2563eb}.thumb{width:54px;height:54px;border-radius:14px;background:#2563eb;display:grid;place-items:center;font-size:25px;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}.trip small{display:block;color:#ffffffcc}.modal{position:fixed;z-index:40;inset:0;background:#0008;display:none;padding:16px;overflow:auto}.modal.show{display:block}.box{max-width:520px;margin:40px auto;background:var(--card);border-radius:28px;padding:20px}.boxhead{display:flex;justify-content:space-between;align-items:center}.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(520px,100%);background:rgba(255,255,255,.92);backdrop-filter:blur(16px);padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);border-top:1px solid var(--line)}body.dark .bottom{background:rgba(23,27,36,.92)}.nav{background:transparent;color:var(--muted);min-height:58px;font-size:11px}.empty{text-align:center;color:var(--muted);padding:30px}
</style></head><body><div class="top"><button class="round" onclick="toggleSide()">☰</button><div class="title" id="topTitle">Mis Viajes</div><button class="round" onclick="fav()">★</button><button class="round" onclick="dark()">☾</button></div><div class="shade" id="shade" onclick="toggleSide()"></div><aside class="side" id="side"><div class="sidehead"><h2>🧳 Mis viajes</h2><button class="round" onclick="toggleSide()">×</button></div><div id="tripList"></div><button class="primary" onclick="openTrip()">+ Añadir viaje</button></aside><main><section id="hero" class="hero"><img id="heroImg"><div class="heroText"><h1 id="heroName">Mis Viajes</h1><p id="heroDates"></p><p id="heroDest"></p></div></section><div class="tabs"><button id="t-summary" class="tab active" onclick="view='summary';render()"><span>▦</span><small>Resumen</small></button><button id="t-days" class="tab" onclick="view='days';render()"><span>🗓</span><small>Días</small></button><button id="t-food" class="tab" onclick="view='food';render()"><span>🍽</span><small>Comer</small></button><button id="t-maps" class="tab" onclick="view='maps';render()"><span>📍</span><small>Mapas</small></button><button id="t-pending" class="tab" onclick="view='pending';render()"><span>☑</span><small>Pend.</small></button></div><input id="search" class="search" placeholder="Buscar día, restaurante, mapa, palabra..." oninput="render()"><section id="content"></section></main><nav class="bottom"><button id="n-summary" class="nav active" onclick="view='summary';render()"><span>▦</span>Resumen</button><button id="n-days" class="nav" onclick="view='days';render()"><span>🗓</span>Días</button><button id="n-food" class="nav" onclick="view='food';render()"><span>🍽</span>Comer</button><button id="n-maps" class="nav" onclick="view='maps';render()"><span>📍</span>Mapas</button><button id="n-pending" class="nav" onclick="view='pending';render()"><span>☑</span>Pend.</button></nav><div class="modal" id="tripModal"><div class="box"><div class="boxhead"><h2>Nuevo / editar viaje</h2><button class="round" onclick="closeTrip()">×</button></div><input id="tripName" placeholder="Nombre: Bruselas 2026"><input id="tripDates" placeholder="Fechas"><input id="tripDest" placeholder="Destino"><input id="tripPeople" placeholder="Personas"><input id="tripHotel" placeholder="Hotel / alojamiento"><input id="tripHotelMap" placeholder="Dirección o enlace Maps del hotel"><input id="tripImage" placeholder="URL imagen de portada"><textarea id="tripSummary" placeholder="Resumen"></textarea><button class="primary" onclick="saveTrip()">Guardar viaje</button></div></div><div class="modal" id="dayModal"><div class="box"><div class="boxhead"><h2>Añadir día desde Nota</h2><button class="round" onclick="closeDay()">×</button></div><input id="dayTitle" placeholder="Viernes 4 septiembre 2026"><input id="dayImage" placeholder="URL imagen del día opcional"><textarea id="dayText" placeholder="Pega aquí la nota completa"></textarea><button class="primary" onclick="saveDay()">Organizar y guardar día</button><p class="muted">Versión 5: separa mapas, restaurantes y notas. Evita duplicados y no convierte tips ni recomendaciones en Maps.</p></div></div>
<script>
const KEY="mis_viajes_v5_premium";let view="summary";let active=null;let trips=load();function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function clean(s){s=String(s||"");let out="";for(let i=0;i<s.length;i++){let c=s.charCodeAt(i);if(c>=0xD800&&c<=0xDBFF){let n=s.charCodeAt(i+1);if(n>=0xDC00&&n<=0xDFFF){i++;continue}continue}if(c>=0xDC00&&c<=0xDFFF)continue;out+=s[i]}return out}function starter(){return[{id:id(),name:"Bruselas 2026",dates:"4 - 8 septiembre 2026",dest:"Bruselas, Gante y Brujas",people:"Familia de 4",hotel:"",hotelMap:"",image:"",summary:"Viaje familiar con base en Bruselas.",favorite:false,pending:[],notes:"",days:[]}]}function load(){try{return JSON.parse(localStorage.getItem(KEY))||starter()}catch(e){return starter()}}function save(){localStorage.setItem(KEY,JSON.stringify(trips))}active=trips[0]?.id||null;function trip(){return trips.find(x=>x.id===active)||trips[0]}function city(){let t=trip();let b=(t?.dest||t?.name||"").toLowerCase();if(b.includes("bruselas")||b.includes("brussels")||b.includes("bruxelles"))return"Brussels Belgium";if(b.includes("conil"))return"Conil de la Frontera Spain";if(b.includes("sevilla"))return"Sevilla Spain";if(b.includes("londres")||b.includes("london"))return"London UK";if(b.includes("roma"))return"Rome Italy";return t?.dest||""}function mapUrl(q){q=clean(q).replace(/[📍🎟🔗🗺️➡️➔]/g," ").replace(/\s+/g," ").trim();let c=city();if(c&&!q.toLowerCase().includes(c.toLowerCase().split(" ")[0]))q=q+" "+c;return"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q)}function esc(s){return clean(String(s||"")).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function link(s){return esc(s).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>')}function norm(s){return clean(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim()}function uniquePush(arr,obj){let k=norm(obj.label||obj);if(!k||arr.some(x=>norm(x.label||x)===k))return;arr.push(obj)}function toggleSide(){side.classList.toggle("open");shade.classList.toggle("show")}function dark(){document.body.classList.toggle("dark")}function openTrip(){let t=trip();tripName.value=t?.name||"";tripDates.value=t?.dates||"";tripDest.value=t?.dest||"";tripPeople.value=t?.people||"";tripHotel.value=t?.hotel||"";tripHotelMap.value=t?.hotelMap||"";tripImage.value=t?.image||"";tripSummary.value=t?.summary||"";tripModal.classList.add("show")}function closeTrip(){tripModal.classList.remove("show")}function openDay(){dayModal.classList.add("show")}function closeDay(){dayModal.classList.remove("show")}function setActive(x){active=x;view="summary";toggleSide();render()}function renderTrips(){tripList.innerHTML=trips.map(t=>`<div class="trip ${t.id===active?'active':''}" onclick="setActive('${t.id}')"><div class="thumb">${t.image?`<img src="${esc(t.image)}">`:"🧳"}</div><div><b>${t.favorite?'★ ':''}${esc(t.name)}</b><small>${esc(t.dates)}</small><small>${esc(t.dest)}</small></div></div>`).join("")}function render(){renderTrips();["summary","days","food","maps","pending"].forEach(v=>{document.getElementById("t-"+v).classList.toggle("active",view===v);document.getElementById("n-"+v).classList.toggle("active",view===v)});let t=trip();if(!t){content.innerHTML=`<div class="card"><h2>Bienvenido</h2><button class="primary" onclick="openTrip()">+ Añadir viaje</button></div>`;return}topTitle.textContent=t.name;heroName.textContent=t.name;heroDates.textContent=t.dates;heroDest.textContent=t.dest;heroImg.src=t.image||"";hero.classList.toggle("hasimg",!!t.image);if(view==="summary")content.innerHTML=summary(t);if(view==="days")content.innerHTML=days(t);if(view==="food")content.innerHTML=food(t);if(view==="maps")content.innerHTML=maps(t);if(view==="pending")content.innerHTML=pending(t)}function hotelLink(t){if(!t.hotelMap&&!t.hotel)return"";let q=t.hotelMap||t.hotel;let url=q.startsWith("http")?q:mapUrl(q);return`<br><a href="${esc(url)}" target="_blank">Abrir hotel en Maps</a>`}function allPlaces(t){let a=[];(t.days||[]).forEach(d=>(d.places||[]).forEach(p=>uniquePush(a,p)));return a}function allFood(t){let a=[];(t.days||[]).forEach(d=>(d.food||[]).forEach(p=>uniquePush(a,p)));return a}function summary(t){return`<div class="card"><h2>Resumen del viaje</h2><p>${esc(t.summary)}</p><span class="badge">${(t.days||[]).length} días</span><span class="badge">${allPlaces(t).length} mapas</span><span class="badge">${allFood(t).length} restaurantes</span><div class="row"><div>👥</div><div><b>Personas</b><br><span class="muted">${esc(t.people||"Sin indicar")}</span></div></div><div class="row"><div>🏨</div><div><b>Alojamiento</b><br><span class="muted">${esc(t.hotel||"Sin indicar")}</span>${hotelLink(t)}</div></div><div class="actions"><button class="secondary" onclick="openDay()">+ Añadir día</button><button class="secondary" onclick="openTrip()">Editar viaje</button><button class="danger" onclick="delTrip()">Eliminar viaje</button></div></div>`}function days(t){let q=search.value.toLowerCase();let ds=(t.days||[]).filter(d=>JSON.stringify(d).toLowerCase().includes(q));return`<div class="card"><h2>Itinerario por días</h2><button class="primary" onclick="openDay()">+ Añadir día desde Nota</button></div>${ds.length?ds.map((d,i)=>dayCard(d,i)).join(""):"<div class='empty'>No hay días o no hay resultados.</div>"}`}function placeCard(x,icon){return`<div class="place"><a href="${esc(x.url)}" target="_blank">${icon} ${esc(x.label)}</a><div class="muted">${esc(x.query||x.address||"")}</div>${x.note?`<p>${esc(x.note)}</p>`:""}</div>`}function dayCard(d,i){return`<div class="card day">${d.image?`<img src="${esc(d.image)}" style="width:100%;border-radius:18px;margin-bottom:12px">`:""}<div class="head"><div><h3>${esc(d.title)}</h3><p class="muted">${esc(d.subtitle)}</p></div><button class="secondary" onclick="navigator.clipboard.writeText(trip().days[${i}].raw)">Copiar</button></div>${d.times.length?`<div class="block"><h4>⏰ Cronograma rápido</h4>${d.times.map(x=>`<div class="timeitem"><div class="time">${esc(x.time)}</div><div>${link(x.text)}</div></div>`).join("")}</div>`:""}${block("🚆 Logística",d.logistics)}${d.places.length?`<div class="block"><h4>📍 Lugares y mapas</h4>${d.places.map(x=>placeCard(x,"📍")).join("")}</div>`:""}${d.food.length?`<div class="block"><h4>🍽 Restaurantes</h4>${d.food.map(x=>placeCard(x,"🍽")).join("")}</div>`:""}${block("📝 Notas y consejos",d.notes)}<details class="block"><summary><b>Ver nota original</b></summary><p class="raw">${link(d.raw)}</p></details><div class="actions"><button class="danger" onclick="delDay(${i})">Eliminar día</button></div></div>`}function block(title,arr){return arr&&arr.length?`<div class="block"><h4>${title}</h4>${arr.map(x=>`<p>• ${link(x)}</p>`).join("")}</div>`:""}function maps(t){let a=allPlaces(t);return`<div class="card"><h2>Mapas del viaje</h2>${hotelLink(t)||"<p class='muted'>Añade hotel en editar viaje.</p>"}</div>${a.length?a.map(p=>`<div class="card">${placeCard(p,"📍")}</div>`).join(""):"<div class='empty'>No hay mapas.</div>"}`}function food(t){let a=allFood(t);return a.length?a.map(p=>`<div class="card">${placeCard(p,"🍽")}</div>`).join(""):"<div class='empty'>No hay restaurantes todavía.</div>"}function pending(t){return`<div class="card"><h2>Pendiente de reservar</h2><input id="newPending" placeholder="Nuevo pendiente"><button class="primary" onclick="addPending()">Añadir</button></div><div class="card">${t.pending.length?t.pending.map((p,i)=>`<p>○ ${esc(p)} <button class="danger" onclick="remPending(${i})">×</button></p>`).join(""):"<p class='muted'>No hay pendientes.</p>"}</div>`}function saveTrip(){let name=clean(tripName.value).trim();if(!name)return alert("Pon nombre al viaje");let t=trip()||{id:id(),pending:[],notes:"",days:[]};Object.assign(t,{name,dates:clean(tripDates.value).trim(),dest:clean(tripDest.value).trim(),people:clean(tripPeople.value).trim(),hotel:clean(tripHotel.value).trim(),hotelMap:clean(tripHotelMap.value).trim(),image:clean(tripImage.value).trim(),summary:clean(tripSummary.value).trim()});if(!trips.includes(t)){trips.push(t);active=t.id}save();closeTrip();render()}function addPlace(d,label,query){uniquePush(d.places,{label:label.trim(),query:query.trim(),url:mapUrl(query)})}function addFood(d,label,address,note){let q=address||label;uniquePush(d.food,{label:label.trim(),address:(address||"").trim(),query:q,note:(note||"").trim(),url:mapUrl(q)})}function parseDay(title,raw,img){let d={id:id(),title:title||"Nuevo día",subtitle:"",image:img||"",raw,times:[],logistics:[],places:[],food:[],pending:[],notes:[]};let lines=raw.split(/\n/).map(x=>clean(x).trim()).filter(Boolean);d.subtitle=(lines.find(x=>/BRUSELAS|CONIL|SEVILLA|LONDRES|ROMA|DÍA|DIA/i.test(x))||"").replace(/[🇧🇪🇪🇸🇬🇧🇮🇹]/g,"").trim();let sec="notes",lastPlace="",lastFood=null;for(let line of lines){let c=line.replace(/^[-*•]\s*/,"").trim();if(/CRONOGRAMA|HORARIO/i.test(c)){sec="times";continue}if(/LOGÍSTICA|LOGISTICA|TRANSPORTE|AEROPUERTO|METRO|TREN|BUS/i.test(c))sec="logistics";if(/RUTA|PASEO|ESCÉNICA|ESCENICA|ITINERARIO/i.test(c))sec="places";if(/OPCIONES DE CENA|RESTAURANTE|CENA|COMIDA|DESAYUNO|BAR|CAFÉ|CAFE|DELIRIUM/i.test(c))sec="food";if(/PENDIENTE|RESERVAR|ENTRADAS|BILLETES|COMPRAR/i.test(c))sec="pending";if(/NOTAS IMPORTANTES|NOTAS|TIP/i.test(c))sec="notes";let tm=c.match(/(\d{1,2}:\d{2})\s*[|–-]?\s*(.*)/);if(tm){d.times.push({time:tm[1],text:tm[2]||c});continue}let numbered=c.match(/^\d+\.\s*(.+?)(\s*➔|\s*->|\s*Maps|$)/i);if(numbered){lastPlace=numbered[1];addPlace(d,lastPlace,lastPlace);continue}let opt=c.match(/OPCI[ÓO]N\s*[A-Z]:\s*(.+)/i)||c.match(/FINAL DE NOCHE:\s*(.+)/i);if(opt){lastFood=opt[1].replace(/[🏆🐚🍺]/g,"").trim();continue}if(/FIN DE SIÈCLE|CHEZ LÉON|DELIRIUM CAFÉ/i.test(c)&&!lastFood){lastFood=c.replace(/[🏆🐚🍺]/g,"").trim()}let dir=c.match(/Direcci[oó]n:\s*(.+?)(\s*\||$)/i);if(dir){if(sec==="food"||lastFood){addFood(d,lastFood||"Restaurante",dir[1],"");lastFood=null}else{addPlace(d,lastPlace||"Dirección",dir[1])}continue}if(/📍\s*Maps|➔\s*Maps|->\s*Maps/i.test(c))continue;if(/Recomendaci[oó]n:|Tip:|Bater[ií]a:|Ambiente:|Tren:/i.test(c)){d.notes.push(c);continue}if(sec==="logistics")d.logistics.push(c);else if(sec==="pending")d.pending.push(c);else if(sec==="food")d.notes.push(c);else if(sec==="places"){if(!/RUTA|Desde la estación/i.test(c))d.notes.push(c)}else d.notes.push(c)}return d}function saveDay(){try{let t=trip();if(!t)return alert("Primero crea un viaje");let raw=clean(dayText.value).trim();if(!raw)return alert("Pega la nota");let d=parseDay(clean(dayTitle.value).trim(),raw,clean(dayImage.value).trim());t.days=t.days||[];t.days.push(d);t.pending=[...(t.pending||[]),...d.pending];save();dayTitle.value="";dayImage.value="";dayText.value="";closeDay();view="days";render();alert("Día guardado")}catch(e){alert("Error guardando: "+e.message)}}function fav(){let t=trip();if(t){t.favorite=!t.favorite;save();render()}}function delTrip(){if(confirm("¿Eliminar viaje completo?")){trips=trips.filter(x=>x.id!==active);active=trips[0]?.id||null;save();render()}}function delDay(i){if(confirm("¿Eliminar día?")){trip().days.splice(i,1);save();render()}}function addPending(){if(newPending.value.trim()){trip().pending.push(clean(newPending.value).trim());save();render()}}function remPending(i){trip().pending.splice(i,1);save();render()}render();
</script></body></html>
