<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mis Viajes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Mis Viajes</title>

  <style>
    :root {
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #15161a;
      --muted: #737782;
      --line: #e8e9ef;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --danger: #ef4444;
      --shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
      --radius: 22px;
    }

    body.dark {
      --bg: #090b10;
      --card: #171a21;
      --text: #f4f6fb;
      --muted: #a3a8b6;
      --line: #2a2f3a;
      --accent: #7aa2ff;
      --accent-soft: rgba(122, 162, 255, 0.16);
      --shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea { font-family: inherit; }
    button { border: 0; cursor: pointer; border-radius: 16px; font-weight: 700; }
    a { color: var(--accent); text-decoration: none; font-weight: 700; }

    .topbar {
      position: sticky; top: 0; z-index: 20;
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
      display: flex; align-items: center; gap: 10px;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--card); color: var(--text);
      border: 1px solid var(--line);
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      font-size: 18px;
    }

    .top-title {
      flex: 1; text-align: center; font-weight: 800; font-size: 17px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .app { max-width: 520px; margin: 0 auto; padding: 14px 16px 90px; }

    .hero {
      min-height: 168px; border-radius: 26px; overflow: hidden; position: relative;
      box-shadow: var(--shadow); margin-bottom: 14px;
      background: linear-gradient(135deg, rgba(21,22,26,.15), rgba(21,22,26,.80)), url("icons/travel-bg.svg");
      background-size: cover; background-position: center;
    }

    .hero-content { position: absolute; inset: auto 0 0 0; padding: 18px; color: white; }
    .hero h1 { margin: 0; font-size: 31px; letter-spacing: -0.8px; }
    .hero p { margin: 6px 0 0; opacity: .92; font-weight: 600; }

    .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-bottom: 14px; }
    .tab {
      background: var(--card); border: 1px solid var(--line); padding: 12px 6px;
      color: var(--text); box-shadow: 0 8px 20px rgba(0,0,0,.04); min-height: 70px;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .tab span { display: block; font-size: 22px; margin-bottom: 4px; }
    .tab small { font-size: 12px; font-weight: 800; }

    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 17px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .card h2, .card h3 { margin: 0 0 12px; letter-spacing: -0.3px; }
    .muted { color: var(--muted); font-size: 14px; }

    .info-row {
      display: grid; grid-template-columns: 30px 1fr; gap: 10px; align-items: start;
      padding: 10px 0; border-bottom: 1px solid var(--line);
    }
    .info-row:last-child { border-bottom: 0; }

    .primary { background: var(--accent); color: white; width: 100%; padding: 14px 16px; font-size: 16px; margin-top: 6px; }
    .secondary { background: var(--accent-soft); color: var(--accent); padding: 11px 13px; }
    .danger { background: rgba(239,68,68,.12); color: var(--danger); padding: 11px 13px; }

    input, textarea {
      width: 100%; border: 1px solid var(--line); background: var(--bg); color: var(--text);
      padding: 13px 14px; border-radius: 16px; font-size: 15px; margin-bottom: 10px; outline: none;
    }
    textarea { min-height: 190px; resize: vertical; line-height: 1.45; }
    .search { background: var(--card); margin-bottom: 12px; }

    .day-card { border-left: 5px solid var(--accent); }
    .day-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
    .day-head h3 { margin: 0; font-size: 21px; }

    .timeline { display: grid; gap: 8px; margin: 12px 0; }
    .time-item {
      display: grid; grid-template-columns: 68px 1fr; gap: 8px; align-items: start;
      padding: 9px; background: var(--bg); border: 1px solid var(--line); border-radius: 15px;
    }
    .time { color: var(--accent); font-weight: 900; text-decoration: underline; }

    .section-block { margin-top: 13px; padding-top: 13px; border-top: 1px solid var(--line); }
    .section-block h4 { margin: 0 0 8px; font-size: 16px; }
    .raw-note { white-space: pre-wrap; line-height: 1.48; color: var(--text); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .bottom-nav {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; z-index: 18;
      width: min(520px, 100%); padding: 8px 12px calc(env(safe-area-inset-bottom) + 8px);
      background: color-mix(in srgb, var(--card) 90%, transparent);
      backdrop-filter: blur(18px); border-top: 1px solid var(--line);
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .nav-btn { background: transparent; color: var(--muted); padding: 8px 2px; font-size: 12px; border-radius: 14px; }
    .nav-btn.active { color: var(--accent); background: var(--accent-soft); }
    .nav-btn span { display: block; font-size: 20px; margin-bottom: 2px; }

    .sidebar {
      position: fixed; z-index: 40; top: 0; left: -330px; width: 320px; max-width: 84vw; height: 100vh;
      padding: calc(env(safe-area-inset-top) + 18px) 15px 30px;
      background: #10141c; color: white; box-shadow: 20px 0 50px rgba(0,0,0,.38);
      transition: .24s ease; overflow-y: auto;
    }
    .sidebar.open { left: 0; }
    .overlay { position: fixed; inset: 0; z-index: 35; display: none; background: rgba(0,0,0,.45); }
    .overlay.show { display: block; }
    .side-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

    .trip-item {
      display: grid; grid-template-columns: 58px 1fr; gap: 12px; padding: 10px; border-radius: 17px;
      margin-bottom: 9px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); cursor: pointer;
    }
    .trip-item.active { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .thumb { width: 58px; height: 58px; border-radius: 13px; background: linear-gradient(135deg, #60a5fa, #1d4ed8); display:grid; place-items:center; font-size:26px; }
    .trip-item strong { display: block; margin-top: 2px; }
    .trip-item small { display: block; color: rgba(255,255,255,.76); margin-top: 3px; }

    .empty { text-align: center; padding: 28px 16px; color: var(--muted); }
    .link-card { padding: 12px; border-radius: 16px; background: var(--bg); border: 1px solid var(--line); margin-bottom: 8px; word-break: break-word; }

    .checkbox-line { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .checkbox-line:last-child { border-bottom: 0; }
    .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--muted); margin-top: 2px; flex: 0 0 auto; }

    .modal {
      position: fixed; z-index: 50; inset: 0; display: none; padding: 18px;
      background: rgba(0,0,0,.55); overflow-y: auto;
    }
    .modal.show { display: block; }
    .modal-card {
      max-width: 520px; margin: calc(env(safe-area-inset-top) + 20px) auto 30px;
      background: var(--card); border: 1px solid var(--line); border-radius: 26px; padding: 18px; box-shadow: var(--shadow);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
  </style>
</head>

<body>
  <div class="topbar">
    <button class="icon-btn" onclick="toggleSidebar()">â°</button>
    <div class="top-title" id="topTitle">Mis Viajes</div>
    <button class="icon-btn" onclick="toggleFavoriteActive()">â</button>
    <button class="icon-btn" onclick="toggleDark()">âŸ</button>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <h2>đ§ł Mis viajes</h2>
      <button class="icon-btn" onclick="toggleSidebar()">Ă</button>
    </div>
    <div id="tripList"></div>
    <button class="primary" onclick="openTripModal()">ïŒ AĂ±adir viaje</button>
  </aside>

  <main class="app">
    <section class="hero">
      <div class="hero-content">
        <h1 id="heroName">Mis Viajes</h1>
        <p id="heroMeta"></p>
        <p id="heroDest"></p>
      </div>
    </section>

    <div class="tabs">
      <button class="tab active" id="tab-summary" onclick="setView('summary')"><span>âŠ</span><small>Resumen</small></button>
      <button class="tab" id="tab-days" onclick="setView('days')"><span>đ</span><small>Itinerario</small></button>
      <button class="tab" id="tab-pending" onclick="setView('pending')"><span>â</span><small>Pendientes</small></button>
      <button class="tab" id="tab-links" onclick="setView('links')"><span>đ</span><small>Enlaces</small></button>
    </div>

    <input class="search" id="search" placeholder="Buscar dĂ­a, restaurante, mapa, palabra..." oninput="render()" />
    <section id="content"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-summary" onclick="setView('summary')"><span>âŠ</span>Resumen</button>
    <button class="nav-btn" id="nav-days" onclick="setView('days')"><span>đ</span>DĂ­as</button>
    <button class="nav-btn" id="nav-pending" onclick="setView('pending')"><span>â</span>Pendientes</button>
    <button class="nav-btn" id="nav-links" onclick="setView('links')"><span>đ</span>Enlaces</button>
  </nav>

  <div class="modal" id="tripModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Nuevo viaje</h2>
        <button class="icon-btn" onclick="closeTripModal()">Ă</button>
      </div>
      <input id="tripName" placeholder="Nombre. Ej: Bruselas 2026" />
      <input id="tripDates" placeholder="Fechas. Ej: 4 - 8 septiembre 2026" />
      <input id="tripDestination" placeholder="Destino. Ej: Bruselas, Gante y Brujas" />
      <input id="tripPeople" placeholder="Personas. Ej: Familia de 4" />
      <input id="tripAccommodation" placeholder="Alojamiento. Ej: Rue Sainte-Catherine" />
      <textarea id="tripSummary" placeholder="Resumen general del viaje"></textarea>
      <button class="primary" onclick="saveNewTrip()">Guardar viaje</button>
    </div>
  </div>

  <div class="modal" id="dayModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>AĂ±adir dĂ­a desde Nota</h2>
        <button class="icon-btn" onclick="closeDayModal()">Ă</button>
      </div>
      <input id="dayTitle" placeholder="TĂ­tulo. Ej: Viernes 4 septiembre" />
      <textarea id="dayText" placeholder="Pega aquĂ­ la nota completa de ese dĂ­a desde Notas del iPhone"></textarea>
      <button class="primary" onclick="saveDayFromNote()">Organizar y guardar dĂ­a</button>
      <p class="muted">Detecta horarios, enlaces, mapas, logĂ­stica, rutas, restaurantes y pendientes.</p>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js"));
    }

    const KEY = "mis_viajes_pwa";
    const DARK_KEY = "mis_viajes_dark";
    let currentView = "summary";
    let activeTripId = null;

    const sampleTrips = [
      {
        id: crypto.randomUUID(),
        name: "Bruselas 2026",
        dates: "4 - 8 septiembre 2026",
        destination: "Bruselas, Gante y Brujas",
        people: "Familia de 4",
        accommodation: "Zona Rue Sainte-Catherine",
        transport: "Vuelo desde Madrid + tren/metro",
        budget: "Aprox. 1.200 âŹ",
        favorite: true,
        summary: "Viaje familiar con base en Bruselas y excursiĂłn a Gante y Brujas.",
        pending: ["Reservar tour Gante y Brujas", "Comprar entradas Atomium"],
        links: [
          { label: "Grand Place", url: "https://www.google.com/maps/search/Grand+Place+Bruselas" },
          { label: "Atomium", url: "https://www.google.com/maps/search/Atomium+Bruselas" }
        ],
        notes: "Usar transporte pĂșblico. Llevar calzado cĂłmodo.",
        days: [
          parseDayNote("Viernes 4 septiembre", `đ§đȘ BRUSELAS | VIERNES 4 SEPT 2026

đ CRONOGRAMA RĂPIDO
âą 16:25 | âïž Llegada Aeropuerto Zaventem
âą 17:25 | đ Tren Aeropuerto â Centro
âą 18:00 | đ Llegada a Bruxelles-Central
âą 18:30 | đš Check-in / Descanso
âą 19:30 | đ¶ Paseo Centro HistĂłrico
âą 21:00 | đœ Cena Fin de SiĂšcle o Chez LĂ©on
âą 22:30 | đș Delirium CafĂ©

đ LOGĂSTICA: AEROPUERTO â CENTRO
EstaciĂłn destino: Bruxelles-Central. DuraciĂłn: ~20 min.

đ Enlaces Ăștiles:
âą https://www.google.com/maps/search/Brussels+Airport
âą https://www.google.com/maps/search/Bruxelles-Central

đ¶ RUTA ESCĂNICA AL ALOJAMIENTO
1. Mont des Arts
2. GalerĂ­as Saint Hubert
3. Grand Place

đœ Restaurantes:
Fin de SiĂšcle
Chez LĂ©on

đ Notas:
DĂ­a suave para llegar, instalarse y pasear.`)
        ]
      }
    ];

    let trips = load();
    activeTripId = trips[0]?.id || null;

    function load() {
      const saved = localStorage.getItem(KEY);
      return saved ? JSON.parse(saved) : sampleTrips;
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(trips)); }
    function activeTrip() { return trips.find(t => t.id === activeTripId) || trips[0]; }

    function toggleDark() {
      document.body.classList.toggle("dark");
      localStorage.setItem(DARK_KEY, document.body.classList.contains("dark"));
    }
    if (localStorage.getItem(DARK_KEY) === "true") document.body.classList.add("dark");

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }

    function setView(view) { currentView = view; render(); }

    function render() {
      const trip = activeTrip();
      const content = document.getElementById("content");
      if (!trip) {
        content.innerHTML = `<div class="card"><h2>Bienvenido</h2><p>Crea tu primer viaje para empezar.</p><button class="primary" onclick="openTripModal()">ïŒ AĂ±adir viaje</button></div>`;
        document.getElementById("topTitle").textContent = "Mis Viajes";
        return;
      }

      document.getElementById("topTitle").textContent = trip.name;
      document.getElementById("heroName").textContent = trip.name;
      document.getElementById("heroMeta").textContent = trip.dates || "Sin fechas";
      document.getElementById("heroDest").textContent = trip.destination || "Sin destino";

      ["summary","days","pending","links"].forEach(v => {
        document.getElementById("tab-" + v).classList.toggle("active", currentView === v);
        document.getElementById("nav-" + v).classList.toggle("active", currentView === v);
      });

      renderTripList();

      if (currentView === "summary") content.innerHTML = summaryView(trip);
      if (currentView === "days") content.innerHTML = daysView(trip);
      if (currentView === "pending") content.innerHTML = pendingView(trip);
      if (currentView === "links") content.innerHTML = linksView(trip);
    }

    function renderTripList() {
      const list = document.getElementById("tripList");
      list.innerHTML = trips.map(t => `
        <div class="trip-item ${t.id === activeTripId ? "active" : ""}" onclick="selectTrip('${t.id}')">
          <div class="thumb">đ§ł</div>
          <div>
            <strong>${t.favorite ? "â " : ""}${escapeHtml(t.name)}</strong>
            <small>${escapeHtml(t.dates || "")}</small>
            <small>${escapeHtml(t.destination || "")}</small>
          </div>
        </div>
      `).join("");
    }

    function selectTrip(id) {
      activeTripId = id;
      currentView = "summary";
      toggleSidebar();
      render();
    }

    function summaryView(trip) {
      return `
        <div class="card">
          <h2>Resumen del viaje</h2>
          <p>${escapeHtml(trip.summary || "Sin resumen todavĂ­a.")}</p>
          <div>
            <div class="info-row"><div>đ„</div><div><strong>Personas</strong><br><span class="muted">${escapeHtml(trip.people || "Sin indicar")}</span></div></div>
            <div class="info-row"><div>đ</div><div><strong>Transporte</strong><br><span class="muted">${escapeHtml(trip.transport || "Sin indicar")}</span></div></div>
            <div class="info-row"><div>đš</div><div><strong>Alojamiento</strong><br><span class="muted">${escapeHtml(trip.accommodation || "Sin indicar")}</span></div></div>
            <div class="info-row"><div>đ¶</div><div><strong>Presupuesto</strong><br><span class="muted">${escapeHtml(trip.budget || "Opcional")}</span></div></div>
          </div>
          <div class="actions">
            <button class="secondary" onclick="copyTripSummary()">Copiar resumen</button>
            <button class="secondary" onclick="openDayModal()">ïŒ AĂ±adir dĂ­a</button>
            <button class="danger" onclick="deleteTrip()">Eliminar viaje</button>
          </div>
        </div>
        <div class="card">
          <h3>Notas rĂĄpidas</h3>
          <textarea id="tripNotes">${escapeHtml(trip.notes || "")}</textarea>
          <button class="primary" onclick="saveTripNotes()">Guardar notas</button>
        </div>
      `;
    }

    function daysView(trip) {
      const q = document.getElementById("search").value.toLowerCase();
      const days = (trip.days || []).filter(d => JSON.stringify(d).toLowerCase().includes(q));
      return `
        <div class="card">
          <h2>Itinerario por dĂ­as</h2>
          <p class="muted">AĂ±ade cada nota del iPhone como un dĂ­a independiente.</p>
          <button class="primary" onclick="openDayModal()">ïŒ AĂ±adir dĂ­a desde Nota</button>
        </div>
        ${days.length ? days.map((d, i) => dayCard(d, i)).join("") : `<div class="empty">No hay dĂ­as o no hay resultados.</div>`}
      `;
    }

    function dayCard(day, index) {
      return `
        <div class="card day-card">
          <div class="day-head">
            <div><h3>${escapeHtml(day.title)}</h3><p class="muted">${escapeHtml(day.subtitle || "DĂ­a del viaje")}</p></div>
            <button class="secondary" onclick="copyDay(${index})">Copiar</button>
          </div>
          ${day.times.length ? `<div class="section-block"><h4>â° Cronograma rĂĄpido</h4><div class="timeline">${day.times.map(t => `<div class="time-item"><div class="time">${escapeHtml(t.time)}</div><div>${linkify(escapeHtml(t.text))}</div></div>`).join("")}</div></div>` : ""}
          ${day.logistics.length ? block("đ LogĂ­stica / transporte", day.logistics) : ""}
          ${day.routes.length ? block("đș Rutas", day.routes) : ""}
          ${day.restaurants.length ? block("đœ Restaurantes", day.restaurants) : ""}
          ${day.links.length ? linksBlock(day.links) : ""}
          ${day.pending.length ? block("â Pendiente", day.pending) : ""}
          ${day.notes.length ? block("đ Notas importantes", day.notes) : ""}
          <details class="section-block"><summary><strong>Ver nota original</strong></summary><p class="raw-note">${linkify(escapeHtml(day.raw))}</p></details>
          <div class="actions"><button class="danger" onclick="deleteDay(${index})">Eliminar dĂ­a</button></div>
        </div>
      `;
    }

    function block(title, arr) {
      return `<div class="section-block"><h4>${title}</h4>${arr.map(x => `<p>âą ${linkify(escapeHtml(x))}</p>`).join("")}</div>`;
    }

    function linksBlock(arr) {
      return `<div class="section-block"><h4>đ Enlaces Ăștiles</h4>${arr.map(x => `<div class="link-card"><a href="${x.url}" target="_blank">${escapeHtml(x.label)}</a><div class="muted">${escapeHtml(x.url)}</div></div>`).join("")}</div>`;
    }

    function pendingView(trip) {
      return `
        <div class="card"><h2>Pendiente de reservar</h2><input id="newPending" placeholder="Ej: Reservar restaurante..." /><button class="primary" onclick="addPending()">AĂ±adir pendiente</button></div>
        <div class="card">${(trip.pending || []).length ? trip.pending.map((p, i) => `<div class="checkbox-line"><span class="dot"></span><div style="flex:1">${escapeHtml(p)}</div><button class="danger" onclick="removePending(${i})">Ă</button></div>`).join("") : `<p class="muted">No hay pendientes.</p>`}</div>
      `;
    }

    function linksView(trip) {
      return `
        <div class="card"><h2>Documentos / enlaces Ăștiles</h2><input id="newLinkLabel" placeholder="Nombre del enlace" /><input id="newLinkUrl" placeholder="URL" /><button class="primary" onclick="addLink()">AĂ±adir enlace</button></div>
        ${(trip.links || []).length ? trip.links.map((l, i) => `<div class="card"><a href="${l.url}" target="_blank">${escapeHtml(l.label)}</a><p class="muted">${escapeHtml(l.url)}</p><button class="danger" onclick="removeLink(${i})">Eliminar</button></div>`).join("") : `<div class="empty">No hay enlaces todavĂ­a.</div>`}
      `;
    }

    function parseDayNote(title, raw) {
      const lines = raw.split(/\n/).map(l => l.trim()).filter(Boolean);
      const day = { id: crypto.randomUUID(), title: title || "DĂ­a sin tĂ­tulo", subtitle: "", raw, times: [], logistics: [], routes: [], restaurants: [], links: [], pending: [], notes: [] };
      const firstTitle = lines.find(l => l.length > 8 && /BRUSELAS|CONIL|SEVILLA|LONDRES|ROMA|DĂA|DIA/i.test(l));
      if (firstTitle) day.subtitle = firstTitle.replace(/[đ§đȘđȘđžđŹđ§đźđč]/g, "").trim();
      let section = "notes";

      for (const line of lines) {
        const clean = line.replace(/^[-âą]\s*/, "").trim();
        if (/CRONOGRAMA|HORARIO/i.test(clean)) { section = "times"; continue; }
        if (/LOGĂSTICA|LOGISTICA|TRANSPORTE|AEROPUERTO|METRO|TREN|BUS/i.test(clean)) section = "logistics";
        if (/RUTA|PASEO|ESCĂNICA|ESCENICA|ITINERARIO/i.test(clean)) section = "routes";
        if (/RESTAURANTE|CENA|COMIDA|DESAYUNO|BAR|CAFĂ|CAFE|TAPAS/i.test(clean)) section = "restaurants";
        if (/ENLACES|MAPS|GOOGLE MAPS|UBICACIĂN|UBICACION/i.test(clean)) section = "links";
        if (/PENDIENTE|RESERVAR|ENTRADAS|BILLETES|COMPRAR/i.test(clean)) section = "pending";

        const timeMatch = clean.match(/(\d{1,2}:\d{2})\s*[|â-]?\s*(.*)/);
        if (timeMatch) { day.times.push({ time: timeMatch[1], text: timeMatch[2] || clean }); continue; }

        const urlMatch = clean.match(/https?:\/\/\S+/);
        if (urlMatch) { day.links.push({ label: labelFromUrlOrLine(clean), url: urlMatch[0] }); continue; }

        if (section === "logistics") day.logistics.push(clean);
        else if (section === "routes") day.routes.push(clean);
        else if (section === "restaurants") day.restaurants.push(clean);
        else if (section === "links") { if (clean.length > 4) day.links.push({ label: clean, url: googleSearchUrl(clean) }); }
        else if (section === "pending") day.pending.push(clean);
        else day.notes.push(clean);
      }

      day.logistics = unique(day.logistics).filter(x => !/LOGĂSTICA|LOGISTICA/i.test(x));
      day.routes = unique(day.routes).filter(x => !/RUTA/i.test(x));
      day.restaurants = unique(day.restaurants).filter(x => !/RESTAURANTE/i.test(x));
      day.pending = unique(day.pending);
      day.notes = unique(day.notes).filter(x => x !== day.subtitle);
      return day;
    }

    function labelFromUrlOrLine(line) {
      const withoutUrl = line.replace(/https?:\/\/\S+/, "").replace(/[âąđđđ]/g, "").trim();
      return withoutUrl || "Abrir enlace";
    }
    function googleSearchUrl(text) { return "https://www.google.com/maps/search/" + encodeURIComponent(text.replace(/[đđđ]/g, "").trim()); }
    function unique(arr) { return [...new Set(arr.filter(Boolean))]; }
    function linkify(text) { return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>'); }
    function escapeHtml(str) { return String(str || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }

    function openTripModal() { document.getElementById("tripModal").classList.add("show"); }
    function closeTripModal() { document.getElementById("tripModal").classList.remove("show"); }
    function openDayModal() { document.getElementById("dayModal").classList.add("show"); }
    function closeDayModal() { document.getElementById("dayModal").classList.remove("show"); }

    function saveNewTrip() {
      const name = document.getElementById("tripName").value.trim();
      if (!name) return alert("Pon un nombre al viaje.");
      const trip = {
        id: crypto.randomUUID(), name,
        dates: document.getElementById("tripDates").value.trim(),
        destination: document.getElementById("tripDestination").value.trim(),
        people: document.getElementById("tripPeople").value.trim(),
        accommodation: document.getElementById("tripAccommodation").value.trim(),
        transport: "", budget: "", favorite: false,
        summary: document.getElementById("tripSummary").value.trim(),
        pending: [], links: [], notes: "", days: []
      };
      trips.push(trip); activeTripId = trip.id; save(); closeTripModal(); render();
    }

    function saveDayFromNote() {
      const title = document.getElementById("dayTitle").value.trim();
      const text = document.getElementById("dayText").value.trim();
      if (!text) return alert("Pega la nota del dĂ­a.");
      const trip = activeTrip();
      const parsed = parseDayNote(title || "Nuevo dĂ­a", text);
      trip.days = trip.days || [];
      trip.days.push(parsed);
      trip.pending = unique([...(trip.pending || []), ...parsed.pending]);
      trip.links = [...(trip.links || []), ...parsed.links];
      save();
      document.getElementById("dayTitle").value = "";
      document.getElementById("dayText").value = "";
      closeDayModal(); currentView = "days"; render();
    }

    function toggleFavoriteActive() { const trip = activeTrip(); trip.favorite = !trip.favorite; save(); render(); }
    function saveTripNotes() { activeTrip().notes = document.getElementById("tripNotes").value; save(); alert("Notas guardadas"); }
    function copyTripSummary() { const t = activeTrip(); navigator.clipboard.writeText(`${t.name}\n${t.dates}\n${t.destination}\n\n${t.summary}`); alert("Resumen copiado"); }
    function copyDay(index) { const d = activeTrip().days[index]; navigator.clipboard.writeText(d.raw); alert("DĂ­a copiado"); }
    function deleteDay(index) { if (!confirm("ÂżEliminar este dĂ­a?")) return; activeTrip().days.splice(index, 1); save(); render(); }
    function deleteTrip() { if (!confirm("ÂżEliminar este viaje completo?")) return; trips = trips.filter(t => t.id !== activeTripId); activeTripId = trips[0]?.id || null; save(); render(); }
    function addPending() { const input = document.getElementById("newPending"); const val = input.value.trim(); if (!val) return; activeTrip().pending.push(val); save(); render(); }
    function removePending(i) { activeTrip().pending.splice(i, 1); save(); render(); }
    function addLink() { const label = document.getElementById("newLinkLabel").value.trim(); const url = document.getElementById("newLinkUrl").value.trim(); if (!label || !url) return alert("Pon nombre y URL."); activeTrip().links.push({ label, url }); save(); render(); }
    function removeLink(i) { activeTrip().links.splice(i, 1); save(); render(); }

    render();
  </script>
</body>
