<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mis Viajes">
<link rel="manifest" href="manifest.json">
<title>Mis Viajes</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--soft:#dbeafe;--danger:#ef4444}
body.dark{--bg:#0b0f18;--card:#171b24;--text:#f9fafb;--muted:#a1a1aa;--line:#2b3140;--soft:#1e3a8a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,textarea{font:inherit}button{border:0;border-radius:16px;font-weight:800}a{color:var(--blue);font-weight:800;text-decoration:none}
.top{position:sticky;top:0;z-index:10;background:rgba(245,246,250,.88);backdrop-filter:blur(16px);display:flex;gap:10px;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;border-bottom:1px solid var(--line)}
body.dark .top{background:rgba(11,15,24,.88)}.title{flex:1;text-align:center;font-size:20px;font-weight:900}.round{width:46px;height:46px;border-radius:50%;background:var(--card);color:var(--text);border:1px solid var(--line);font-size:20px}
main{max-width:520px;margin:0 auto;padding:18px 16px 95px}.hero{height:180px;border-radius:28px;background:linear-gradient(135deg,#60a5fa,#111827);color:white;padding:24px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:16px;box-shadow:0 14px 34px #0002}.hero h1{font-size:36px;margin:0}.hero p{margin:6px 0 0;font-weight:700;opacity:.92}
.tabs,.bottom{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.tab,.nav{background:var(--card);color:var(--text);border:1px solid var(--line);padding:12px 6px;min-height:68px}.tab.active,.nav.active,.primary{background:var(--blue);color:white}.tab span,.nav span{display:block;font-size:22px}.tab small{font-weight:900}
.search,input,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;background:var(--card);color:var(--text);margin:12px 0;font-size:16px}textarea{min-height:230px;line-height:1.45}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 12px 28px #0001}.card h2,.card h3{margin:0 0 12px}.muted{color:var(--muted)}.primary{width:100%;padding:15px;margin:8px 0;font-size:17px}.secondary{background:var(--soft);color:var(--blue);padding:11px 13px}.danger{background:#fee2e2;color:var(--danger);padding:11px 13px}.actions{display:flex;gap:8px;flex-wrap:wrap}
.row{display:grid;grid-template-columns:30px 1fr;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.day{border-left:5px solid var(--blue)}.head{display:flex;justify-content:space-between;gap:10px}.timeitem{display:grid;grid-template-columns:70px 1fr;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:10px;margin:8px 0}.time{color:var(--blue);font-weight:900;text-decoration:underline}.block{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.raw{white-space:pre-wrap;line-height:1.45}
.side{position:fixed;z-index:30;inset:0 auto 0 -330px;width:320px;max-width:86vw;background:#111827;color:white;padding:calc(env(safe-area-inset-top) + 18px) 15px 30px;transition:.25s;box-shadow:18px 0 40px #0007}.side.open{left:0}.shade{position:fixed;inset:0;background:#0007;display:none;z-index:20}.shade.show{display:block}.sidehead{display:flex;justify-content:space-between;align-items:center}.trip{display:grid;grid-template-columns:54px 1fr;gap:12px;padding:10px;border-radius:18px;background:#ffffff12;margin:9px 0}.trip.active{background:#2563eb}.thumb{width:54px;height:54px;border-radius:14px;background:#2563eb;display:grid;place-items:center;font-size:25px}.trip small{display:block;color:#ffffffcc}
.modal{position:fixed;z-index:40;inset:0;background:#0008;display:none;padding:16px;overflow:auto}.modal.show{display:block}.box{max-width:520px;margin:40px auto;background:var(--card);border-radius:28px;padding:20px}.boxhead{display:flex;justify-content:space-between;align-items:center}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(520px,100%);background:rgba(255,255,255,.9);backdrop-filter:blur(16px);padding:8px 12px calc(env(safe-area-inset-bottom) + 8px);border-top:1px solid var(--line)}body.dark .bottom{background:rgba(23,27,36,.9)}.nav{background:transparent;color:var(--muted);min-height:58px;font-size:12px}.empty{text-align:center;color:var(--muted);padding:30px}.linkcard{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0;word-break:break-word}
.badge{display:inline-block;background:var(--soft);color:var(--blue);padding:5px 9px;border-radius:999px;font-size:13px;font-weight:800;margin:3px 4px 3px 0}
</style>
</head>
<body>
<div class="top"><button class="round" onclick="toggleSide()">☰</button><div class="title" id="topTitle">Mis Viajes</div><button class="round" onclick="fav()">★</button><button class="round" onclick="dark()">☾</button></div>
<div class="shade" id="shade" onclick="toggleSide()"></div>
<aside class="side" id="side"><div class="sidehead"><h2>🧳 Mis viajes</h2><button class="round" onclick="toggleSide()">×</button></div><div id="tripList"></div><button class="primary" onclick="openTrip()">+ Añadir viaje</button></aside>
<main>
<section class="hero"><h1 id="heroName">Mis Viajes</h1><p id="heroDates"></p><p id="heroDest"></p></section>
<div class="tabs"><button id="t-summary" class="tab active" onclick="view='summary';render()"><span>▦</span><small>Resumen</small></button><button id="t-days" class="tab" onclick="view='days';render()"><span>🗓</span><small>Itinerario</small></button><button id="t-pending" class="tab" onclick="view='pending';render()"><span>☑</span><small>Pendientes</small></button><button id="t-links" class="tab" onclick="view='links';render()"><span>🔗</span><small>Enlaces</small></button></div>
<input id="search" class="search" placeholder="Buscar día, restaurante, mapa, palabra..." oninput="render()">
<section id="content"></section>
</main>
<nav class="bottom"><button id="n-summary" class="nav active" onclick="view='summary';render()"><span>▦</span>Resumen</button><button id="n-days" class="nav" onclick="view='days';render()"><span>🗓</span>Días</button><button id="n-pending" class="nav" onclick="view='pending';render()"><span>☑</span>Pendientes</button><button id="n-links" class="nav" onclick="view='links';render()"><span>🔗</span>Enlaces</button></nav>
<div class="modal" id="tripModal"><div class="box"><div class="boxhead"><h2>Nuevo viaje</h2><button class="round" onclick="closeTrip()">×</button></div><input id="tripName" placeholder="Nombre: Bruselas 2026"><input id="tripDates" placeholder="Fechas: 4 - 8 septiembre 2026"><input id="tripDest" placeholder="Destino"><input id="tripPeople" placeholder="Personas"><input id="tripHotel" placeholder="Alojamiento"><textarea id="tripSummary" placeholder="Resumen"></textarea><button class="primary" onclick="saveTrip()">Guardar viaje</button></div></div>
<div class="modal" id="dayModal"><div class="box"><div class="boxhead"><h2>Añadir día desde Nota</h2><button class="round" onclick="closeDay()">×</button></div><input id="dayTitle" placeholder="Viernes 4 septiembre 2026"><textarea id="dayText" placeholder="Pega aquí la nota completa"></textarea><button class="primary" onclick="saveDay()">Organizar y guardar día</button><p class="muted">Versión 3: mapas mejorados. Si detecta Dirección o Ubicación, añade ciudad/destino del viaje para evitar búsquedas raras.</p></div></div>
<script>
const KEY="mis_viajes_v3";let view="summary";let active=null;let trips=load();
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function clean(s){return String(s||"").replace(/[\uD800-\uDBFF](?![\uDC00-\uDFFF])|(?<![\uD800-\uDBFF])[\uDC00-\uDFFF]/g,"")}
function cityFromTrip(){let t=trip();let base=(t?.dest||t?.name||"").toLowerCase();if(base.includes("bruselas")||base.includes("brussels")||base.includes("bruxelles"))return "Brussels Belgium";if(base.includes("conil"))return "Conil de la Frontera Spain";if(base.includes("sevilla"))return "Sevilla Spain";if(base.includes("londres")||base.includes("london"))return "London UK";if(base.includes("roma")||base.includes("rome"))return "Rome Italy";return t?.dest||""}
function mapUrl(q){q=clean(q).replace(/[📍🎟🔗🗺️➡️➔]/g," ").replace(/\s+/g," ").trim();let city=cityFromTrip();if(city && !q.toLowerCase().includes(city.toLowerCase().split(" ")[0])) q=q+" "+city;return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q)}
function starter(){return[{id:id(),name:"Bruselas 2026",dates:"4 - 8 septiembre 2026",dest:"Bruselas, Gante y Brujas",people:"Familia de 4",hotel:"",summary:"Viaje familiar con base en Bruselas.",favorite:false,pending:[],links:[],notes:"",days:[]}]}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||starter()}catch(e){return starter()}}
function save(){localStorage.setItem(KEY,JSON.stringify(trips))}
active=trips[0]?.id||null;
function trip(){return trips.find(x=>x.id===active)||trips[0]}
function esc(s){return clean(String(s||"")).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function link(s){return esc(s).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>')}
function toggleSide(){side.classList.toggle("open");shade.classList.toggle("show")}
function dark(){document.body.classList.toggle("dark")}
function openTrip(){tripModal.classList.add("show")}function closeTrip(){tripModal.classList.remove("show")}function openDay(){dayModal.classList.add("show")}function closeDay(){dayModal.classList.remove("show")}
function setActive(x){active=x;view="summary";toggleSide();render()}
function renderTrips(){tripList.innerHTML=trips.map(t=>`<div class="trip ${t.id===active?'active':''}" onclick="setActive('${t.id}')"><div class="thumb">🧳</div><div><b>${t.favorite?'★ ':''}${esc(t.name)}</b><small>${esc(t.dates)}</small><small>${esc(t.dest)}</small></div></div>`).join("")}
function render(){renderTrips();["summary","days","pending","links"].forEach(v=>{document.getElementById("t-"+v).classList.toggle("active",view===v);document.getElementById("n-"+v).classList.toggle("active",view===v)});let t=trip();if(!t){topTitle.textContent="Mis Viajes";heroName.textContent="Mis Viajes";heroDates.textContent="";heroDest.textContent="";content.innerHTML=`<div class="card"><h2>Bienvenido</h2><p>Crea tu primer viaje.</p><button class="primary" onclick="openTrip()">+ Añadir viaje</button></div>`;return}
topTitle.textContent=t.name;heroName.textContent=t.name;heroDates.textContent=t.dates;heroDest.textContent=t.dest;
if(view==="summary")content.innerHTML=summary(t); if(view==="days")content.innerHTML=days(t); if(view==="pending")content.innerHTML=pending(t); if(view==="links")content.innerHTML=linksView(t)}
function summary(t){return `<div class="card"><h2>Resumen del viaje</h2><p>${esc(t.summary)}</p><span class="badge">${(t.days||[]).length} días</span><span class="badge">${(t.links||[]).length} enlaces</span><div class="row"><div>👥</div><div><b>Personas</b><br><span class="muted">${esc(t.people||"Sin indicar")}</span></div></div><div class="row"><div>🏨</div><div><b>Alojamiento</b><br><span class="muted">${esc(t.hotel||"Sin indicar")}</span></div></div><div class="actions"><button class="secondary" onclick="openDay()">+ Añadir día</button><button class="danger" onclick="delTrip()">Eliminar viaje</button></div></div>`}
function days(t){let q=search.value.toLowerCase();let ds=(t.days||[]).filter(d=>JSON.stringify(d).toLowerCase().includes(q));return `<div class="card"><h2>Itinerario por días</h2><button class="primary" onclick="openDay()">+ Añadir día desde Nota</button></div>${ds.length?ds.map((d,i)=>dayCard(d,i)).join(""):'<div class="empty">No hay días o no hay resultados.</div>'}`}
function dayCard(d,i){return `<div class="card day"><div class="head"><div><h3>${esc(d.title)}</h3><p class="muted">${esc(d.subtitle)}</p></div><button class="secondary" onclick="navigator.clipboard.writeText(trip().days[${i}].raw)">Copiar</button></div>${d.times.length?`<div class="block"><h4>⏰ Cronograma rápido</h4>${d.times.map(x=>`<div class="timeitem"><div class="time">${esc(x.time)}</div><div>${link(x.text)}</div></div>`).join("")}</div>`:""}${block("🚆 Logística",d.logistics)}${block("🗺 Rutas",d.routes)}${block("🍽 Restaurantes",d.restaurants)}${linksBlock(d.links)}${block("☑ Pendiente",d.pending)}${block("📝 Notas",d.notes)}<details class="block"><summary><b>Ver nota original</b></summary><p class="raw">${link(d.raw)}</p></details><div class="actions"><button class="danger" onclick="delDay(${i})">Eliminar día</button></div></div>`}
function block(title,arr){return arr&&arr.length?`<div class="block"><h4>${title}</h4>${arr.map(x=>`<p>• ${link(x)}</p>`).join("")}</div>`:""}
function linksBlock(arr){return arr&&arr.length?`<div class="block"><h4>🔗 Enlaces útiles</h4>${arr.map(x=>`<div class="linkcard"><a href="${esc(x.url)}" target="_blank">📍 ${esc(x.label)}</a><div class="muted">${esc(x.query||x.url)}</div></div>`).join("")}</div>`:""}
function pending(t){return `<div class="card"><h2>Pendiente de reservar</h2><input id="newPending" placeholder="Nuevo pendiente"><button class="primary" onclick="addPending()">Añadir</button></div><div class="card">${t.pending.length?t.pending.map((p,i)=>`<p>○ ${esc(p)} <button class="danger" onclick="remPending(${i})">×</button></p>`).join(""):"<p class='muted'>No hay pendientes.</p>"}</div>`}
function linksView(t){return `<div class="card"><h2>Enlaces útiles</h2><input id="lab" placeholder="Nombre"><input id="url" placeholder="URL o dirección"><button class="primary" onclick="addLink()">Añadir enlace</button></div>${t.links.length?t.links.map((l,i)=>`<div class="card"><a href="${esc(l.url)}" target="_blank">${esc(l.label)}</a><p class="muted">${esc(l.query||l.url)}</p><button class="danger" onclick="remLink(${i})">Eliminar</button></div>`).join(""):"<div class='empty'>No hay enlaces.</div>"}`}
function saveTrip(){let name=clean(tripName.value).trim();if(!name)return alert("Pon nombre al viaje");let t={id:id(),name,dates:clean(tripDates.value).trim(),dest:clean(tripDest.value).trim(),people:clean(tripPeople.value).trim(),hotel:clean(tripHotel.value).trim(),summary:clean(tripSummary.value).trim(),favorite:false,pending:[],links:[],notes:"",days:[]};trips.push(t);active=t.id;save();closeTrip();render()}
function addAutoLink(day,label,query){query=clean(query).trim();if(!query)return;day.links.push({label:label||query,query:query,url:mapUrl(query)})}
function parseDay(title,raw){let d={id:id(),title:title||"Nuevo día",subtitle:"",raw,times:[],logistics:[],routes:[],restaurants:[],links:[],pending:[],notes:[]};let lines=raw.split(/\n/).map(x=>clean(x).trim()).filter(Boolean);d.subtitle=(lines.find(x=>/BRUSELAS|CONIL|SEVILLA|LONDRES|ROMA|DÍA|DIA/i.test(x))||"").replace(/[🇧🇪🇪🇸🇬🇧🇮🇹]/g,"").trim();let sec="notes", lastPlace="";for(let line of lines){let c=line.replace(/^[-*•]\s*/,"").trim();if(/CRONOGRAMA|HORARIO/i.test(c)){sec="times";continue}if(/LOGÍSTICA|LOGISTICA|TRANSPORTE|AEROPUERTO|METRO|TREN|BUS/i.test(c))sec="logistics";if(/RUTA|PASEO|ESCÉNICA|ESCENICA|ITINERARIO/i.test(c))sec="routes";if(/RESTAURANTE|CENA|COMIDA|DESAYUNO|BAR|CAFÉ|CAFE|DELIRIUM|OPCIONES|FIN DE SIÈCLE|CHEZ LÉON/i.test(c))sec="restaurants";if(/ENLACES|MAPS|GOOGLE MAPS|UBICACIÓN|UBICACION/i.test(c))sec="links";if(/PENDIENTE|RESERVAR|ENTRADAS|BILLETES|COMPRAR/i.test(c))sec="pending";
let tm=c.match(/(\d{1,2}:\d{2})\s*[|–-]?\s*(.*)/);if(tm){d.times.push({time:tm[1],text:tm[2]||c});continue}
let u=c.match(/https?:\/\/\S+/);if(u){d.links.push({label:c.replace(u[0],"").trim()||"Abrir enlace",query:u[0],url:u[0]});continue}
let dir=c.match(/Direcci[oó]n:\s*(.+?)(\s*\||$)/i);if(dir){addAutoLink(d,lastPlace||"Dirección",dir[1]);}
let numbered=c.match(/^\d+\.\s*(.+?)(\s*➔|\s*->|\s*Maps|$)/i);if(numbered){lastPlace=numbered[1];addAutoLink(d,lastPlace,lastPlace);}
if(/OPCI[ÓO]N|FINAL DE NOCHE|🏆|🐚|🍺/.test(c)){lastPlace=c.replace(/OPCI[ÓO]N\s*[A-Z]:/i,"").replace(/FINAL DE NOCHE:/i,"").replace(/[🏆🐚🍺]/g,"").trim();}
if(/📍\s*Maps|➔\s*Maps|->\s*Maps/i.test(c) && lastPlace){addAutoLink(d,lastPlace,lastPlace);}
if(sec==="logistics")d.logistics.push(c);else if(sec==="routes")d.routes.push(c);else if(sec==="restaurants")d.restaurants.push(c);else if(sec==="pending")d.pending.push(c);else if(sec==="links"){ if(!/Maps$/i.test(c)) addAutoLink(d,c,c); } else d.notes.push(c)}
return d}
function saveDay(){try{let t=trip();if(!t)return alert("Primero crea un viaje");let raw=clean(dayText.value).trim();if(!raw)return alert("Pega la nota");let d=parseDay(clean(dayTitle.value).trim(),raw);t.days=t.days||[];t.days.push(d);t.pending=[...(t.pending||[]),...d.pending];t.links=[...(t.links||[]),...d.links];save();dayTitle.value="";dayText.value="";closeDay();view="days";render();alert("Día guardado")}catch(e){alert("Error guardando: "+e.message)}}
function fav(){let t=trip();if(t){t.favorite=!t.favorite;save();render()}}function delTrip(){if(confirm("¿Eliminar viaje completo?")){trips=trips.filter(x=>x.id!==active);active=trips[0]?.id||null;save();render()}}function delDay(i){if(confirm("¿Eliminar día?")){trip().days.splice(i,1);save();render()}}function addPending(){if(newPending.value.trim()){trip().pending.push(clean(newPending.value).trim());save();render()}}function remPending(i){trip().pending.splice(i,1);save();render()}function addLink(){if(lab.value.trim()&&url.value.trim()){let raw=clean(url.value).trim();let final=raw.startsWith("http")?raw:mapUrl(raw);trip().links.push({label:clean(lab.value).trim(),query:raw,url:final});save();render()}}function remLink(i){trip().links.splice(i,1);save();render()}
render();
</script>
</body>
</html>
